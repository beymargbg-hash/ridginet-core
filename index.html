<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDGI NET - Sistema Integral v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #080c14; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .input-dark { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); outline: none; }
        .btn-gradient { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); transition: all 0.3s ease; }
        .btn-callcenter { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .badge-active { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .badge-suspended { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .section-active { display: block; animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
        .status-online { color: #4ade80; text-shadow: 0 0 15px rgba(74, 222, 128, 0.5); }
    </style>
</head>
<body class="antialiased">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col p-6">
        
        <section id="section-login" class="section-active mt-12">
            <div class="text-center mb-10">
                <div class="inline-flex h-20 w-20 items-center justify-center rounded-3xl bg-blue-600/10 border border-blue-500/20 mb-4 shadow-2xl">
                    <i class="fa-solid fa-shield-halved text-4xl text-blue-500"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tighter italic text-white">RIDGI<span class="text-blue-500">NET</span></h1>
            </div>

            <div class="glass rounded-[2.5rem] p-8 shadow-2xl">
                <div class="space-y-6">
                    <input type="text" id="login-user" placeholder="Usuario o DNI" class="input-dark w-full py-4 px-6 rounded-2xl text-sm font-medium">
                    <input type="password" id="login-pass" placeholder="••••••••" class="input-dark w-full py-4 px-6 rounded-2xl text-sm font-medium">
                    <button type="button" onclick="autenticar()" class="btn-gradient w-full py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg shadow-blue-900/40">
                        Ingresar al Sistema <i class="fa-solid fa-arrow-right-long ml-2"></i>
                    </button>
                </div>
            </div>
        </section>

        <section id="section-cliente" class="hidden space-y-6">
            <header class="flex justify-between items-center py-4">
                <h1 class="text-xl font-black italic">RIDGI<span class="text-blue-500">NET</span></h1>
                <button onclick="mostrarSeccion('login')" class="h-10 w-10 rounded-xl bg-slate-800 flex items-center justify-center text-red-400 border border-slate-700 shadow-lg">
                    <i class="fa-solid fa-door-open"></i>
                </button>
            </header>

            <div class="glass rounded-[2.8rem] p-8 shadow-2xl border-t border-white/10">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1 italic">Estado del Servicio</p>
                        <h2 class="text-4xl font-black status-online uppercase">Conectado</h2>
                        <p id="client-id-display" class="text-[10px] font-mono text-blue-400/50 mt-2 italic">ID: CLIENTE-777</p>
                    </div>
                    <div class="h-4 w-4 rounded-full bg-green-500 shadow-[0_0_15px_rgba(74,222,128,0.5)] animate-pulse"></div>
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between items-center bg-slate-900/60 p-5 rounded-3xl border border-white/5 shadow-inner">
                        <span class="text-xs text-slate-400 font-semibold uppercase italic">Vencimiento</span>
                        <span class="font-mono font-bold text-white">15 MAR 2026</span>
                    </div>
                </div>
            </div>

            <div class="grid gap-4">
                <button onclick="irAPagar()" class="btn-gradient w-full py-5 rounded-2xl text-white font-extrabold flex items-center justify-center gap-3">
                    <i class="fa-solid fa-building-columns"></i> PAGAR AHORA
                </button>
                <button onclick="mostrarSeccion('callcenter')" class="btn-callcenter w-full py-5 rounded-2xl text-white font-extrabold flex items-center justify-center gap-3">
                    <i class="fa-solid fa-headset"></i> CALL CENTER
                </button>
            </div>
        </section>

        <section id="section-owner" class="hidden space-y-6 pb-20">
            <header class="flex justify-between items-center py-4">
                <h1 class="text-xl font-black italic uppercase">ADMIN<span class="text-blue-500">MAESTRO</span></h1>
                <button onclick="mostrarSeccion('login')" class="h-10 w-10 rounded-xl bg-red-500/10 text-red-500 border border-red-500/20 shadow-lg">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </header>

            <div class="glass rounded-3xl p-6 border-t border-blue-500/30 shadow-2xl">
                <button onclick="document.getElementById('mk-api-config').classList.toggle('hidden')" class="w-full flex justify-between items-center text-blue-400 font-black text-[10px] uppercase tracking-widest italic">
                    <span><i class="fa-solid fa-gears mr-2"></i> Configuración API MikroTik</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
                <div id="mk-api-config" class="mt-5 space-y-4 hidden">
                    <input type="text" id="mk-host" placeholder="IP del Router (ej. 192.168.88.1)" class="input-dark w-full py-3 px-5 rounded-xl text-[11px]">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="mk-user" placeholder="Usuario API" class="input-dark py-3 px-5 rounded-xl text-[11px]">
                        <input type="password" id="mk-pass" placeholder="Pass API" class="input-dark py-3 px-5 rounded-xl text-[11px]">
                    </div>
                    <button onclick="alert('✅ Parámetros Guardados')" class="w-full bg-blue-600/20 border border-blue-500 text-blue-400 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest">
                        Guardar Parámetros
                    </button>
                </div>
            </div>

            <div class="glass rounded-3xl p-6 border-t border-blue-500/30">
                <button onclick="document.getElementById('form-nuevo-cliente').classList.toggle('hidden')" class="w-full flex justify-between items-center text-blue-400 font-black text-[10px] uppercase tracking-[0.2em] italic">
                    <span><i class="fa-solid fa-user-plus mr-2"></i> Registrar Nuevo Abonado</span>
                    <i class="fa-solid fa-plus"></i>
                </button>
                <div id="form-nuevo-cliente" class="mt-5 space-y-4 hidden">
                    <input type="text" id="new-client-name" placeholder="Nombre Completo" class="input-dark w-full py-3 px-5 rounded-xl text-[11px]">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="new-client-ip" placeholder="IP MikroTik" class="input-dark py-3 px-5 rounded-xl text-[11px]">
                        <select id="new-client-plan" class="input-dark py-3 px-3 rounded-xl text-[10px] font-bold italic uppercase">
                            <option value="5MB">Plan 5 Megas</option>
                            <option value="10MB">Plan 10 Megas</option>
                        </select>
                    </div>
                    <button onclick="crearClienteNuevo()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest">Dar de Alta en MikroTik</button>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-xs font-black uppercase text-slate-400 px-2 italic">Gestión de Abonados</h3>
                <div class="glass rounded-[2rem] p-6 space-y-5 border-l-4 border-blue-500 shadow-2xl">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-black text-white text-lg">Juan Perez Wisp</h4>
                            <p class="text-[10px] text-slate-500 font-mono italic tracking-tighter">IP: 192.168.88.50</p>
                        </div>
                        <span id="badge-status-juan" class="badge-active px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest italic">Activo</span>
                    </div>

                    <div class="bg-slate-900/50 p-4 rounded-xl border border-white/5 space-y-1">
                        <p class="text-[8px] text-slate-500 font-black uppercase italic">Último Pago:</p>
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-bold text-emerald-400">$15.000 (05 Mar)</span>
                            <span class="text-[10px] font-mono text-slate-400 italic">Transferencia</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <button onclick="controlMikrotik('reiniciar', 'Juan')" class="bg-blue-600/10 border border-blue-500/30 text-blue-400 py-3 rounded-xl text-[9px] font-black uppercase">REINICIAR</button>
                        <button onclick="controlMikrotik('corte', 'Juan')" class="bg-red-600/10 border border-red-500/30 text-red-500 py-3 rounded-xl text-[9px] font-black uppercase">CORTE</button>
                        <button onclick="controlMikrotik('reconectar', 'Juan')" class="bg-green-600/10 border border-green-500/30 text-green-400 py-3 rounded-xl text-[9px] font-black uppercase">CONECTAR</button>
                        <button onclick="controlMikrotik('reintegro', 'Juan')" class="bg-emerald-600/10 border border-emerald-500/30 text-emerald-400 py-3 rounded-xl text-[9px] font-black uppercase">REINTEGRO</button>
                    </div>

                    <button onclick="alert('📂 HISTORIAL:\n- 05/03: $15k (Trf)\n- 05/02: $15k (Efct)')" class="w-full bg-slate-800/80 border border-slate-700 py-3 rounded-xl text-[9px] font-black uppercase italic tracking-widest text-slate-400">
                        <i class="fa-solid fa-clock-rotate-left mr-2"></i> Ver Historial de Pagos
                    </button>
                </div>
            </div>

            <div class="bg-blue-600/5 border border-blue-500/20 rounded-[2.5rem] p-6 space-y-4 shadow-inner">
                <h3 class="text-xs font-bold italic uppercase tracking-widest text-white">Registro Pago Manual</h3>
                <input type="text" id="reg-usuario" placeholder="Usuario / IP" class="input-dark w-full py-3 px-5 rounded-xl text-[11px]">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="reg-monto" placeholder="Monto $" class="input-dark py-3 px-5 rounded-xl text-[11px]">
                    <select id="reg-metodo" class="input-dark py-3 px-3 rounded-xl text-[10px] font-bold uppercase italic">
                        <option value="Transferencia">Transferencia</option>
                        <option value="Efectivo">Efectivo</option>
                    </select>
                </div>
                <button onclick="registrarPagoManual()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg">Validar y Activar</button>
            </div>
        </section>

        <section id="section-callcenter" class="hidden space-y-6">
            <header class="flex items-center gap-4 py-4">
                <button onclick="mostrarSeccion('cliente')" class="h-10 w-10 rounded-xl bg-slate-800 flex items-center justify-center text-blue-400 border border-slate-700">
                    <i class="fa-solid fa-chevron-left text-sm"></i>
                </button>
                <h2 class="text-xl font-black italic uppercase">Call Center</h2>
            </header>
            <button onclick="window.open('https://wa.me/50374500751')" class="flex items-center justify-between p-6 bg-slate-900/60 rounded-3xl border border-white/5 w-full">
                <div class="flex items-center gap-5">
                    <i class="fa-brands fa-whatsapp text-green-400 text-2xl"></i>
                    <p class="text-sm font-black italic">WhatsApp Soporte</p>
                </div>
            </button>
        </section>

        <footer class="mt-auto pt-10 text-center pb-4">
            <span class="text-[8px] text-slate-500 uppercase font-black tracking-[0.2em] italic">ELOHIM MANAGEMENT SYSTEM v2.0</span>
        </footer>
    </div>

    <script>
        function mostrarSeccion(id) {
            const sections = ['section-login', 'section-cliente', 'section-owner', 'section-callcenter'];
            sections.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
        }

        function autenticar() {
            const u = document.getElementById('login-user').value.toLowerCase().trim();
            const p = document.getElementById('login-pass').value.trim();
            
            if (u === 'admin' && p === '1234') {
                mostrarSeccion('owner');
            } else if (u === 'cliente' && p === '0000') {
                mostrarSeccion('cliente');
            } else {
                alert("🔒 Error: Datos incorrectos.");
            }
        }

        function controlMikrotik(accion, usuario) {
            const badge = document.getElementById('badge-status-juan');
            if(accion === 'corte') {
                badge.innerText = "Suspendido";
                badge.className = "badge-suspended px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest italic";
            } else if(accion === 'reconectar') {
                badge.innerText = "Activo";
                badge.className = "badge-active px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest italic";
            }
            alert(`📡 Comando: ${accion} ejecutado para ${usuario}`);
        }

        function registrarPagoManual() {
            const user = document.getElementById('reg-usuario').value;
            if(user) alert(`✅ Pago de ${user} validado con éxito.`);
            else alert("⚠️ Ingrese usuario.");
        }

        function crearClienteNuevo() {
            const nombre = document.getElementById('new-client-name').value;
            if(nombre) {
                alert(`🚀 Cliente ${nombre} preparado para MikroTik.`);
                document.getElementById('form-nuevo-cliente').classList.add('hidden');
            }
        }

        function irAPagar() {
            alert("🏦 Redirigiendo a plataforma de pago...");
        }
    </script>
</body>
</html>
